name: BigExchange
version: '1.3'
main: top.mcocet.bigExchange.BigExchange
api-version: '1.18'
description: 随机兑换码生成插件，支持加密认证、SQLite MySQL 数据库管理
author: mcocet
website: top.mcocet

softdepend: [Geyser-Spigot, floodgate]

commands:
  bigexchange:
    description: 兑换码管理命令
    usage: /<command> [generate|delete|modify|list|info|history|activate|reload]
    aliases: [be, bex]
    permission: bigexchange.admin
  redeem:
    description: 兑换码兑换命令
    usage: /<command> [兑换码]
    aliases: [cdkey, code]
  purchase:
    description: 购买兑换码命令
    usage: /<command>
    aliases: [buy]
  c3query:
    description: Craftconomy3 数据查询命令
    usage: /<command> [玩家名称|*all*]
    aliases: [craftconomy3query, c3q]

permissions:
  bigexchange.admin:
    description: 访问所有管理员命令
    default: op
  bigexchange.redeem:
    description: 使用兑换码
    default: true
  bigexchange.purchase:
    description: 购买兑换码
    default: true
  bigexchange.craftconomy3.query:
    description: 查询 Craftconomy3 数据
    default: op
  bigexchange.craftconomy3.query.all:
    description: 查询所有在线玩家的 Craftconomy3 数据
    default: op
